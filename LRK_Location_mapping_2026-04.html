<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>LRK Lokacijų Žemėlapis</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #F4F6F8; color: #2C3E50; height: 100vh; display: flex; flex-direction: column; }

header { background: #2C3E50; color: white; padding: 0.65rem 1.4rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
.logo { background: #C0392B; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0; }
header h1 { font-size: 14px; font-weight: 600; }
header p  { font-size: 11px; opacity: 0.55; }
.hdr-meta { margin-left: auto; font-size: 11px; opacity: 0.6; text-align: right; line-height: 1.5; }

.content { flex: 1; display: flex; overflow: hidden; }
#map-panel { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* Filter buttons */
.filter-bar { position: absolute; top: 12px; left: 12px; z-index: 1000; display: flex; gap: 5px; flex-wrap: wrap; max-width: 55%; }
.flt-btn { padding: 5px 13px; border-radius: 20px; border: 2px solid; cursor: pointer; font-size: 11px; font-weight: 600; background: white; box-shadow: 0 1px 5px rgba(0,0,0,0.12); transition: all .15s; display: flex; align-items: center; gap: 5px; }
.flt-btn .fd { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.flt-btn.on  { color: white; }
.flt-btn.off { opacity: 0.38; }

/* Summary */
.map-summary { position: absolute; top: 12px; right: 12px; z-index: 1000; background: white; border-radius: 10px; padding: 12px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); font-size: 12px; min-width: 175px; }
.sum-title { font-size: 10px; text-transform: uppercase; color: #90A4AE; letter-spacing: .06em; margin-bottom: 8px; font-weight: 600; }
.sum-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; border-bottom: 0.5px solid #F0F2F4; gap: 8px; }
.sum-row:last-child { border-bottom: none; }
.sum-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.sum-label { flex: 1; color: #546E7A; }
.sum-val { font-weight: 600; }

/* Legend */
.map-legend { position: absolute; bottom: 24px; left: 12px; z-index: 1000; background: white; border-radius: 10px; padding: 12px 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); font-size: 11px; }
.leg-title { font-size: 10px; text-transform: uppercase; color: #90A4AE; letter-spacing: .06em; margin-bottom: 8px; font-weight: 600; }
.leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

/* Side list */
#side-panel { width: 265px; flex-shrink: 0; background: white; border-left: 1px solid #E0E4E8; display: flex; flex-direction: column; overflow: hidden; }
.side-title { padding: 12px 16px 8px; border-bottom: 1px solid #E8ECF0; flex-shrink: 0; }
.side-title h2 { font-size: 13px; font-weight: 600; }
.side-title p  { font-size: 11px; color: #90A4AE; margin-top: 2px; }
.side-search { padding: 8px 12px; border-bottom: 1px solid #E8ECF0; flex-shrink: 0; }
.side-search input { width: 100%; padding: 5px 9px; border: 1px solid #DDE1E7; border-radius: 6px; font-size: 12px; outline: none; }
.side-search input:focus { border-color: #2C3E50; }
.side-scroll { flex: 1; overflow-y: auto; }
.loc-row { padding: 7px 14px; border-bottom: 0.5px solid #F5F5F5; cursor: pointer; }
.loc-row:hover { background: #F8F9FA; }
.loc-name { font-size: 12px; font-weight: 500; color: #2C3E50; display: flex; align-items: center; gap: 6px; }
.loc-sub  { font-size: 11px; color: #90A4AE; margin-top: 1px; padding-left: 16px; }
.loc-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; color: white; }
.side-footer { padding: 8px 14px; border-top: 1px solid #E8ECF0; font-size: 10px; color: #B0BEC5; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="logo">+</div>
  <div>
    <h1>LRK Lokacijų Žemėlapis</h1>
    <p>Fizinės vietos pagal tipą</p>
  </div>
  <div class="hdr-meta">
    Atnaujinta: 2026-04-09<br>
    Šaltinis: Darbinis_Locations_HR.xlsx
  </div>
</header>

<div class="content">
  <div id="map-panel">
    <div id="map"></div>
    <div class="filter-bar" id="filter-bar"></div>
    <div class="map-summary" id="sum"></div>
    <div class="map-legend" id="leg"></div>
  </div>

  <div id="side-panel">
    <div class="side-title">
      <h2>Vietos sąrašas</h2>
      <p id="side-count">—</p>
    </div>
    <div class="side-search">
      <input type="text" id="search-input" placeholder="Ieškoti adreso, miesto..." oninput="filterList()">
    </div>
    <div class="side-scroll" id="side-list"></div>
    <div class="side-footer" id="side-footer"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script>

// ══════════════════════════════════════════════════════════════════════════
// DUOMENYS — atnaujinti 2026-04-09
// ══════════════════════════════════════════════════════════════════════════
var LOCATIONS = [
  { addr:"Alytus",                              info:"",                                   kodas:"",      miestas:"Alytus",      sav:"Alytaus m. sav.",      aps:"Alytaus",       tipas:"",                 lat:54.4024, lng:23.8568 },
  { addr:"Statybininkų 12, Kaunas",             info:"",                                   kodas:"50127", miestas:"Kaunas",      sav:"Kauno m. sav.",         aps:"Kauno",         tipas:"Biuras",           lat:54.9057, lng:23.9553 },
  { addr:"Raseiniai",                           info:"",                                   kodas:"",      miestas:"Raseiniai",   sav:"Raseinių r. sav.",      aps:"Kauno",         tipas:"Rezervo sandėlis", lat:55.3813, lng:23.1225 },
  { addr:"V. Grybo g. 25, Raseiniai",           info:"",                                   kodas:"60117", miestas:"Raseiniai",   sav:"Raseinių r. sav.",      aps:"Kauno",         tipas:"",                 lat:55.3754, lng:23.1258 },
  { addr:"Žemaitės g. 6A, Raseiniai",           info:"",                                   kodas:"60127", miestas:"Raseiniai",   sav:"Raseinių r. sav.",      aps:"Kauno",         tipas:"Biuras",           lat:55.3805, lng:23.1180 },
  { addr:"Kęstučio g. 5, Vilkaviškis",          info:"",                                   kodas:"70190", miestas:"Vilkaviškis", sav:"Vilkaviškio r. sav.",   aps:"Marijampolės",  tipas:"Biuras",           lat:54.6520, lng:23.0334 },
  { addr:"Vilkaviškis",                         info:"",                                   kodas:"",      miestas:"Vilkaviškis", sav:"Vilkaviškio r. sav.",   aps:"Marijampolės",  tipas:"Rezervo sandėlis", lat:54.6515, lng:23.0340 },
  { addr:"Rungos g. 22, Elektrėnai",            info:"",                                   kodas:"26110", miestas:"Elektrėnai",  sav:"Elektrėnų sav.",        aps:"Vilniaus",      tipas:"HP",               lat:54.7850, lng:24.6620 },
  { addr:"Taikos g. 6B, Elektrėnai",            info:"",                                   kodas:"26115", miestas:"Elektrėnai",  sav:"Elektrėnų sav.",        aps:"Vilniaus",      tipas:"Rezervo sandėlis", lat:54.7793, lng:24.6578 },
  { addr:"Miškų g. 29, Ukmergė",               info:"",                                   kodas:"20163", miestas:"Ukmergė",     sav:"Ukmergės r. sav.",      aps:"Vilniaus",      tipas:"Biuras",           lat:55.2390, lng:24.7548 },
  { addr:"Miškų g. 29, Ukmergė",               info:"",                                   kodas:"20163", miestas:"Ukmergė",     sav:"Ukmergės r. sav.",      aps:"Vilniaus",      tipas:"HP",               lat:55.2393, lng:24.7551 },
  { addr:"Vytauto g. 75A, Ukmergė",             info:"",                                   kodas:"20112", miestas:"Ukmergė",     sav:"Ukmergės r. sav.",      aps:"Vilniaus",      tipas:"Rezervo sandėlis", lat:55.2450, lng:24.7760 },
  { addr:"Jasinskio g. 16B, Vilnius",           info:'Verslo centras "Victoria", 4 aukštas',kodas:"3163",  miestas:"Vilnius",     sav:"Vilniaus m. sav.",      aps:"Vilniaus",      tipas:"Biuras",           lat:54.6887, lng:25.2628 },
  { addr:"Jasinskio g. 16B, Vilnius",           info:"Biuras (laikina pasidėjimo vieta?)",  kodas:"3163",  miestas:"Vilnius",     sav:"Vilniaus m. sav.",      aps:"Vilniaus",      tipas:"Rezervo sandėlis", lat:54.6887, lng:25.2628 },
  { addr:"Vilnius",                             info:"",                                   kodas:"",      miestas:"Vilnius",     sav:"Vilniaus m. sav.",      aps:"Vilniaus",      tipas:"Rezervo sandėlis", lat:54.6872, lng:25.2797 },
  { addr:"Vilnius",                             info:"",                                   kodas:"",      miestas:"Vilnius",     sav:"Vilniaus m. sav.",      aps:"Vilniaus",      tipas:"Rezervo sandėlis", lat:54.6880, lng:25.2810 },
  { addr:"Vilnius",                             info:"",                                   kodas:"",      miestas:"Vilnius",     sav:"Vilniaus m. sav.",      aps:"Vilniaus",      tipas:"Rezervo sandėlis", lat:54.6865, lng:25.2785 },
  { addr:"Balto g. 1, Ramybės k., Visagino sav.",info:"",                                  kodas:"31139", miestas:"Visaginas",   sav:"Visagino sav.",         aps:"Utenos",        tipas:"Rezervo sandėlis", lat:55.5900, lng:26.4100 },
  { addr:"Vilties g. 1, Visaginas",             info:"",                                   kodas:"31118", miestas:"Visaginas",   sav:"Visagino sav.",         aps:"Utenos",        tipas:"Biuras",           lat:55.6020, lng:26.4310 },
  { addr:"Vilties g. 1, Visaginas",             info:"",                                   kodas:"31118", miestas:"Visaginas",   sav:"Visagino sav.",         aps:"Utenos",        tipas:"HP",               lat:55.6022, lng:26.4313 },
  { addr:"Klaipėdos g. 3, Panevėžys",           info:"",                                   kodas:"35200", miestas:"Panevėžys",   sav:"Panevėžio m. sav.",     aps:"Panevėžio",     tipas:"Biuras",           lat:55.7330, lng:24.3540 },
  { addr:"Panevėžys",                           info:"",                                   kodas:"",      miestas:"Panevėžys",   sav:"Panevėžio m. sav.",     aps:"Panevėžio",     tipas:"Rezervo sandėlis", lat:55.7348, lng:24.3574 },
  { addr:"J.Biliūno g. 2, Rokiškis",            info:"",                                   kodas:"42105", miestas:"Rokiškis",    sav:"Rokiškio r. sav.",      aps:"Panevėžio",     tipas:"Biuras",           lat:55.9612, lng:25.5842 },
  { addr:"Šiauliai",                            info:"",                                   kodas:"",      miestas:"Šiauliai",    sav:"Šiaulių m. sav.",       aps:"Šiaulių",       tipas:"Rezervo sandėlis", lat:55.9349, lng:23.3137 },
  { addr:"Tilžės g. 148, Šiauliai",             info:"",                                   kodas:"76350", miestas:"Šiauliai",    sav:"Šiaulių m. sav.",       aps:"Šiaulių",       tipas:"Biuras",           lat:55.9257, lng:23.3130 },
  { addr:"Ventos g. 8A, Mažeikiai",             info:"",                                   kodas:"89103", miestas:"Mažeikiai",   sav:"Mažeikių r. sav.",      aps:"Telšių",        tipas:"",                 lat:56.3090, lng:22.3320 },
  { addr:"Anykščiai",                           info:"",                                   kodas:"",      miestas:"Anykščiai",   sav:"Anykščių r. sav.",      aps:"Utenos",        tipas:"",                 lat:55.5253, lng:25.0979 },
  { addr:"Lauko g. 19A, Utena",                 info:"2 aukštas",                          kodas:"28203", miestas:"Utena",       sav:"Utenos r. sav.",        aps:"Utenos",        tipas:"Biuras",           lat:55.4972, lng:25.6028 },
  { addr:"Molėtai",                             info:"",                                   kodas:"",      miestas:"Molėtai",     sav:"Molėtų r. sav.",        aps:"Utenos",        tipas:"",                 lat:55.2312, lng:25.4184 },
  { addr:"Klaipėda",                            info:"",                                   kodas:"",      miestas:"Klaipėda",    sav:"Klaipėdos m. sav.",     aps:"Klaipėdos",     tipas:"Rezervo sandėlis", lat:55.7033, lng:21.1443 },
  { addr:"Taikos pr. 28, Klaipėda",             info:"5 aukštas",                          kodas:"91220", miestas:"Klaipėda",    sav:"Klaipėdos m. sav.",     aps:"Klaipėdos",     tipas:"Biuras",           lat:55.6980, lng:21.1550 },
  { addr:"Tauragė",                             info:"",                                   kodas:"",      miestas:"Tauragė",     sav:"Tauragės r. sav.",      aps:"Tauragės",      tipas:"Rezervo sandėlis", lat:55.2520, lng:22.2890 },
  { addr:"V.Kudirkos g. 2A, Tauragė",           info:"",                                   kodas:"72215", miestas:"Tauragė",     sav:"Tauragės r. sav.",      aps:"Tauragės",      tipas:"Biuras",           lat:55.2524, lng:22.2895 },
];

var TYPE_CFG = {
  "Biuras":            { color:"#1565C0", label:"Skyrius / Biuras" },
  "HP":                { color:"#C62828", label:"HP" },
  "Rezervo sandėlis":  { color:"#2E7D32", label:"Rezervo sandėlis" },
  "":                  { color:"#6A1B9A", label:"Nenurodyta" },
};

function tipColor(t) { return (TYPE_CFG[t]||TYPE_CFG[""]).color; }
function tipLabel(t) { return (TYPE_CFG[t]||TYPE_CFG[""]).label; }

// ── Žemėlapis ─────────────────────────────────────────────────────────────
var map = L.map('map').setView([55.17, 23.88], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CartoDB'
}).addTo(map);

var cluster = L.markerClusterGroup({ spiderfyOnMaxZoom:true, showCoverageOnHover:false, zoomToBoundsOnClick:true });
map.addLayer(cluster);

function makeIcon(color) {
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">'
    +'<circle cx="11" cy="11" r="9" fill="'+color+'" stroke="white" stroke-width="2.5"/></svg>';
  return L.divIcon({ className:'', html:svg, iconSize:[22,22], iconAnchor:[11,11], popupAnchor:[0,-12] });
}

// ── Filtrai ────────────────────────────────────────────────────────────────
var activeFilters = {};
var allTypes = Object.keys(TYPE_CFG);
allTypes.forEach(function(t){ activeFilters[t] = true; });

function renderFilterBar() {
  var counts = {};
  allTypes.forEach(function(t){ counts[t]=0; });
  LOCATIONS.forEach(function(d){ counts[d.tipas] = (counts[d.tipas]||0)+1; });

  var fb = document.getElementById('filter-bar');
  fb.innerHTML = allTypes.filter(function(t){ return counts[t]>0; }).map(function(t) {
    var c = tipColor(t);
    var on = activeFilters[t];
    return '<button class="flt-btn '+(on?'on':'off')+'" '
      +'style="border-color:'+c+';'+(on?'background:'+c:'color:'+c)+'" '
      +'onclick="toggleF(\''+t+'\')">'
      +'<span class="fd" style="background:'+(on?'white':c)+'"></span>'
      +tipLabel(t)+' ('+counts[t]+')'
      +'</button>';
  }).join('');
}

function toggleF(t) {
  var on = Object.keys(activeFilters).filter(function(k){ return activeFilters[k]; });
  if (activeFilters[t] && on.length<=1) return;
  activeFilters[t] = !activeFilters[t];
  renderMap();
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderMap() {
  cluster.clearLayers();
  renderFilterBar();

  var counts = {};
  allTypes.forEach(function(t){ counts[t]=0; });

  LOCATIONS.forEach(function(d, idx) {
    if (!activeFilters[d.tipas]) return;
    counts[d.tipas]++;
    var col = tipColor(d.tipas);
    var m = L.marker([d.lat, d.lng], { icon: makeIcon(col) });

    var popup = '<div style="font-family:Segoe UI,Arial,sans-serif;min-width:200px">'
      +'<div style="font-weight:700;font-size:13px;margin-bottom:5px">'+d.addr+'</div>'
      +(d.info?'<div style="font-size:11px;color:#888;margin-bottom:4px;font-style:italic">'+d.info+'</div>':'')
      +'<div style="font-size:11px;color:#546E7A;margin-bottom:3px">'+d.miestas+(d.sav?', '+d.sav:'')+'</div>'
      +(d.kodas?'<div style="font-size:11px;color:#90A4AE;margin-bottom:5px">Pašto kodas: '+d.kodas+'</div>':'')
      +'<span style="background:'+col+';color:white;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">'
      +tipLabel(d.tipas)+'</span></div>';
    m.bindPopup(popup);
    cluster.addLayer(m);
  });

  // Summary
  var html = '<div class="sum-title">Suvestinė</div>';
  allTypes.forEach(function(t) {
    if (!counts[t]) return;
    html += '<div class="sum-row">'
      +'<span class="sum-dot" style="background:'+tipColor(t)+'"></span>'
      +'<span class="sum-label">'+tipLabel(t)+'</span>'
      +'<span class="sum-val">'+counts[t]+'</span></div>';
  });
  var total = Object.values(counts).reduce(function(a,b){return a+b;},0);
  html += '<div class="sum-row" style="margin-top:4px;padding-top:4px;border-top:1px solid #eee;font-weight:700">'
    +'<span style="flex:1">Iš viso</span><span class="sum-val">'+total+'</span></div>';
  document.getElementById('sum').innerHTML = html;

  renderList();
}

// ── Šoninis sąrašas ────────────────────────────────────────────────────────
function filterList() { renderList(); }

function renderList() {
  var q = (document.getElementById('search-input').value||'').toLowerCase().trim();
  var visible = LOCATIONS.filter(function(d) {
    if (!activeFilters[d.tipas]) return false;
    if (!q) return true;
    return [d.addr, d.miestas, d.sav, d.tipas, d.info].some(function(s){
      return s && s.toLowerCase().indexOf(q)>=0;
    });
  });

  document.getElementById('side-count').textContent = visible.length + ' vietų';

  var html = visible.map(function(d) {
    var col = tipColor(d.tipas);
    var label = d.addr.length>28 ? d.addr.substring(0,27)+'…' : d.addr;
    return '<div class="loc-row" onclick="flyTo('+d.lat+','+d.lng+')">'
      +'<div class="loc-name">'
      +'<span class="loc-badge" style="background:'+col+'">'+tipLabel(d.tipas).substring(0,1)+'</span>'
      +label+'</div>'
      +'<div class="loc-sub">'+d.miestas+(d.sav?' · '+d.sav.replace(' sav.',''):'')+'</div>'
      +(d.info?'<div class="loc-sub" style="color:#B0BEC5">'+d.info+'</div>':'')
      +'</div>';
  }).join('');

  document.getElementById('side-list').innerHTML = html ||
    '<div style="padding:20px;text-align:center;color:#B0BEC5;font-size:12px">Nieko nerasta</div>';

  document.getElementById('side-footer').textContent =
    'Iš viso: '+LOCATIONS.length+' vietų · '
    +[...new Set(LOCATIONS.map(function(d){return d.miestas;}))].length+' miestų';
}

function flyTo(lat, lng) {
  map.flyTo([lat, lng], 15, { duration: 0.8 });
  showTab('map');
}

function showTab(t) {
  // Just refocus map if needed
  setTimeout(function(){ map.invalidateSize(); }, 10);
}

// Legend
function renderLegend() {
  var counts = {};
  LOCATIONS.forEach(function(d){ counts[d.tipas]=(counts[d.tipas]||0)+1; });
  var html = '<div class="leg-title">Sutartiniai ženklai</div>';
  allTypes.filter(function(t){ return counts[t]>0; }).forEach(function(t) {
    html += '<div class="leg-row"><div class="leg-dot" style="background:'+tipColor(t)+'"></div>'+tipLabel(t)+'</div>';
  });
  document.getElementById('leg').innerHTML = html;
}

renderMap();
renderLegend();
</script>
</body>
</html>
