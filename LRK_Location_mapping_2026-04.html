<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>LRK Lokacijų Žemėlapis</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #F4F6F8; color: #2C3E50; height: 100vh; display: flex; flex-direction: column; }

header { background: #2C3E50; color: white; padding: 0.65rem 1.4rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
.logo { background: #C0392B; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0; }
header h1 { font-size: 14px; font-weight: 600; }
header p  { font-size: 11px; opacity: 0.55; }
.hdr-meta { margin-left: auto; font-size: 11px; opacity: 0.6; text-align: right; line-height: 1.5; }

.content { flex: 1; display: flex; overflow: hidden; }
#map-panel { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* Filter bar — žemiau zoom mygtukų */
.filter-bar {
  position: absolute;
  top: 10px;
  left: 54px;
  z-index: 1000;
  display: flex; gap: 5px; flex-wrap: wrap; max-width: 75%;
}
.flt-btn { padding: 5px 13px; border-radius: 20px; border: 2px solid; cursor: pointer; font-size: 11px; font-weight: 600; background: white; box-shadow: 0 1px 5px rgba(0,0,0,0.12); transition: all .15s; display: flex; align-items: center; gap: 5px; }
.flt-btn .fd { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.flt-btn.on  { color: white; }
.flt-btn.off { opacity: 0.38; }

/* Summary */
.map-summary { position: absolute; top: 12px; right: 12px; z-index: 1000; background: white; border-radius: 10px; padding: 10px 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); font-size: 12px; min-width: 175px; }
.sum-title { font-size: 10px; text-transform: uppercase; color: #90A4AE; letter-spacing: .06em; margin-bottom: 6px; font-weight: 600; }
.sum-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; border-bottom: 0.5px solid #F0F2F4; gap: 8px; }
.sum-row:last-child { border-bottom: none; font-weight: 700; }
.sum-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.sum-label { flex: 1; color: #546E7A; }
.sum-val { font-weight: 600; }

/* Legend */
.map-legend { position: absolute; bottom: 24px; left: 12px; z-index: 1000; background: white; border-radius: 10px; padding: 10px 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); font-size: 11px; }
.leg-title { font-size: 10px; text-transform: uppercase; color: #90A4AE; letter-spacing: .06em; margin-bottom: 6px; font-weight: 600; }
.leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

/* Side panel */
#side-panel { width: 265px; flex-shrink: 0; background: white; border-left: 1px solid #E0E4E8; display: flex; flex-direction: column; overflow: hidden; }
.side-title { padding: 12px 16px 8px; border-bottom: 1px solid #E8ECF0; flex-shrink: 0; }
.side-title h2 { font-size: 13px; font-weight: 600; }
.side-title p  { font-size: 11px; color: #90A4AE; margin-top: 2px; }
.side-search { padding: 8px 12px; border-bottom: 1px solid #E8ECF0; flex-shrink: 0; }
.side-search input { width: 100%; padding: 5px 9px; border: 1px solid #DDE1E7; border-radius: 6px; font-size: 12px; outline: none; }
.side-search input:focus { border-color: #2C3E50; }
.side-scroll { flex: 1; overflow-y: auto; }
.loc-row { padding: 7px 14px; border-bottom: 0.5px solid #F5F5F5; cursor: pointer; }
.loc-row:hover { background: #F8F9FA; }
.loc-name { font-size: 12px; font-weight: 500; color: #2C3E50; display: flex; align-items: center; gap: 6px; }
.loc-sub  { font-size: 11px; color: #90A4AE; margin-top: 1px; padding-left: 18px; }
.loc-sub2 { font-size: 10px; color: #B0BEC5; margin-top: 1px; padding-left: 18px; font-style: italic; }
.loc-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; color: white; flex-shrink: 0; }
.side-footer { padding: 8px 14px; border-top: 1px solid #E8ECF0; font-size: 10px; color: #B0BEC5; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="logo">+</div>
  <div>
    <h1>LRK Lokacijų Žemėlapis</h1>
    <p>Fizinės vietos pagal tipą</p>
  </div>
  <div class="hdr-meta">
    Atnaujinta: 2026-04-14<br>
    Šaltinis: PER_Resource_mapping_Location.xlsx
  </div>
</header>

<div class="content">
  <div id="map-panel">
    <div id="map"></div>
    <div class="filter-bar" id="filter-bar"></div>
    <div class="map-summary" id="sum"></div>
    <div class="map-legend" id="leg"></div>
  </div>

  <div id="side-panel">
    <div class="side-title">
      <h2>Vietos sąrašas</h2>
      <p id="side-count">—</p>
    </div>
    <div class="side-search">
      <input type="text" id="search-input" placeholder="Ieškoti adreso, miesto..." oninput="filterList()">
    </div>
    <div class="side-scroll" id="side-list"></div>
    <div class="side-footer" id="side-footer"></div>
  </div>
</div>

  {addr:"Uosių g. 8, Dumpiai, Dovilų sen., Klaipėdos r. sav.",tipas:"Rezervo sandėlis",info:"",kodas:"95398",miestas:"Klaipėda",sav:"Klaipėdos raj. sav.",aps:"Klaipėdos",regionas:"Vakarų",skyrius:"Klaipėda",atsakingas:"",lat:55.687774,lng:21.247455},
  {addr:"Liepų g. 16, Šilutė",tipas:"HP",info:"",kodas:"99184",miestas:"Šilutė",sav:"Šilutės raj. sav.",aps:"Klaipėdos",regionas:"Vakarų",skyrius:"Klaipėda",atsakingas:"",lat:55.3512,lng:21.4681},
  {addr:"V. Kudirkos g. 2A, Tauragė",tipas:"Rezervo sandėlis",info:"",kodas:"72214",miestas:"Tauragė",sav:"Tauragės r. sav.",aps:"Tauragės",regionas:"Vakarų",skyrius:"Tauragė",atsakingas:"",lat:55.253792,lng:22.284391},
  {addr:"V. Kudirkos g. 2A, Tauragė",tipas:"Biuras",info:"",kodas:"72215",miestas:"Tauragė",sav:"Tauragės r. sav.",aps:"Tauragės",regionas:"Vakarų",skyrius:"Tauragė",atsakingas:"Jolita Ziekė",lat:55.2524,lng:22.2895},
];

var TYPE_CFG = {
  "Biuras":            {color:"#1565C0", label:"Skyrius / Biuras"},
  "HP":                {color:"#C62828", label:"HP"},
  "Rezervo sandėlis":  {color:"#2E7D32", label:"Rezervo sandėlis"},
  "":                  {color:"#6A1B9A", label:"Nenurodyta"},
};

function tipColor(t){ return (TYPE_CFG[t]||TYPE_CFG[""]).color; }
function tipLabel(t){ return (TYPE_CFG[t]||TYPE_CFG[""]).label; }

// ── Žemėlapis ─────────────────────────────────────────────────────────────
var map = L.map('map').setView([55.17, 23.88], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CartoDB'
}).addTo(map);

var cluster = L.markerClusterGroup({spiderfyOnMaxZoom:true,showCoverageOnHover:false,zoomToBoundsOnClick:true});
map.addLayer(cluster);

function makeIcon(color){
  var svg='<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">'
    +'<circle cx="11" cy="11" r="9" fill="'+color+'" stroke="white" stroke-width="2.5"/></svg>';
  return L.divIcon({className:'',html:svg,iconSize:[22,22],iconAnchor:[11,11],popupAnchor:[0,-12]});
}

// ── Filtrai ────────────────────────────────────────────────────────────────
var activeFilters = {};
Object.keys(TYPE_CFG).forEach(function(t){ activeFilters[t]=true; });

function renderFilterBar(){
  var counts={};
  Object.keys(TYPE_CFG).forEach(function(t){counts[t]=0;});
  LOCATIONS.forEach(function(d){counts[d.tipas]=(counts[d.tipas]||0)+1;});

  var fb=document.getElementById('filter-bar');
  fb.innerHTML=Object.keys(TYPE_CFG).filter(function(t){return counts[t]>0;}).map(function(t){
    var c=tipColor(t), on=activeFilters[t];
    return '<button class="flt-btn '+(on?'on':'off')+'" '
      +'style="border-color:'+c+';'+(on?'background:'+c:'color:'+c)+'" '
      +'onclick="toggleF(\''+t+'\')">'
      +'<span class="fd" style="background:'+(on?'white':c)+'"></span>'
      +tipLabel(t)+' ('+counts[t]+')'
      +'</button>';
  }).join('');
}

function toggleF(t){
  var on=Object.keys(activeFilters).filter(function(k){return activeFilters[k];});
  if(activeFilters[t]&&on.length<=1)return;
  activeFilters[t]=!activeFilters[t];
  renderMap();
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderMap(){
  cluster.clearLayers();
  renderFilterBar();
  var counts={};
  Object.keys(TYPE_CFG).forEach(function(t){counts[t]=0;});

  LOCATIONS.forEach(function(d){
    if(!activeFilters[d.tipas])return;
    counts[d.tipas]++;
    var col=tipColor(d.tipas);
    var m=L.marker([d.lat,d.lng],{icon:makeIcon(col)});

    var popup='<div style="font-family:Segoe UI,Arial,sans-serif;min-width:210px">'
      +'<div style="font-weight:700;font-size:13px;margin-bottom:5px">'+d.addr+'</div>'
      +(d.info?'<div style="font-size:11px;color:#888;margin-bottom:4px;font-style:italic">'+d.info+'</div>':'')
      +'<div style="font-size:11px;color:#555;margin-bottom:2px">'+d.miestas+(d.sav?' · '+d.sav:'')+'</div>'
      +(d.skyrius?'<div style="font-size:11px;color:#555;margin-bottom:2px">Skyrius: <b>'+d.skyrius+'</b></div>':'')
      +(d.regionas?'<div style="font-size:11px;color:#555;margin-bottom:2px">Regionas: '+d.regionas+'</div>':'')
      +(d.atsakingas?'<div style="font-size:11px;color:#555;margin-bottom:5px">Atsakingas: '+d.atsakingas+'</div>':'')
      +(d.kodas?'<div style="font-size:10px;color:#90A4AE;margin-bottom:5px">Pašto kodas: '+d.kodas+'</div>':'')
      +'<span style="background:'+col+';color:white;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">'+tipLabel(d.tipas)+'</span>'
      +'</div>';
    m.bindPopup(popup);
    cluster.addLayer(m);
  });

  // Summary
  var html='<div class="sum-title">Suvestinė</div>';
  Object.keys(TYPE_CFG).forEach(function(t){
    if(!counts[t])return;
    html+='<div class="sum-row">'
      +'<span class="sum-dot" style="background:'+tipColor(t)+'"></span>'
      +'<span class="sum-label">'+tipLabel(t)+'</span>'
      +'<span class="sum-val">'+counts[t]+'</span></div>';
  });
  var total=Object.values(counts).reduce(function(a,b){return a+b;},0);
  html+='<div class="sum-row" style="margin-top:4px;padding-top:4px;border-top:1px solid #eee;font-weight:700">'
    +'<span style="flex:1">Iš viso</span><span class="sum-val">'+total+'</span></div>';
  document.getElementById('sum').innerHTML=html;

  renderList();
}

// ── Sąrašas ────────────────────────────────────────────────────────────────
function filterList(){ renderList(); }

function renderList(){
  var q=(document.getElementById('search-input').value||'').toLowerCase().trim();
  var visible=LOCATIONS.filter(function(d){
    if(!activeFilters[d.tipas])return false;
    if(!q)return true;
    return [d.addr,d.miestas,d.sav,d.tipas,d.skyrius,d.atsakingas,d.info].some(function(s){
      return s&&s.toLowerCase().indexOf(q)>=0;
    });
  });
  document.getElementById('side-count').textContent=visible.length+' vietų';

  var html=visible.map(function(d){
    var col=tipColor(d.tipas);
    var label=d.addr.length>27?d.addr.substring(0,26)+'…':d.addr;
    return '<div class="loc-row" onclick="flyTo('+d.lat+','+d.lng+')">'
      +'<div class="loc-name">'
      +'<span class="loc-badge" style="background:'+col+'">'+(d.tipas?d.tipas.substring(0,1):'N')+'</span>'
      +label+'</div>'
      +(d.skyrius?'<div class="loc-sub">'+d.regionas+' · '+d.skyrius+'</div>':'')
      +'</div>';
  }).join('');

  document.getElementById('side-list').innerHTML=html||
    '<div style="padding:20px;text-align:center;color:#B0BEC5;font-size:12px">Nieko nerasta</div>';

  var miestai=[...new Set(LOCATIONS.map(function(d){return d.miestas;}))].length;
  document.getElementById('side-footer').textContent=
    'Iš viso: '+LOCATIONS.length+' vietų · '+miestai+' miestų';
}

function flyTo(lat,lng){ map.flyTo([lat,lng],15,{duration:0.8}); }

// ── Legenda ────────────────────────────────────────────────────────────────
function renderLegend(){
  var counts={};
  LOCATIONS.forEach(function(d){counts[d.tipas]=(counts[d.tipas]||0)+1;});
  var html='<div class="leg-title">Sutartiniai ženklai</div>';
  Object.keys(TYPE_CFG).filter(function(t){return counts[t]>0;}).forEach(function(t){
    html+='<div class="leg-row"><div class="leg-dot" style="background:'+tipColor(t)+'"></div>'+tipLabel(t)+'</div>';
  });
  document.getElementById('leg').innerHTML=html;
}

renderMap();
renderLegend();
</script>
</body>
</html>
