<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>LRK HR Žemėlapis</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #F4F6F8; color: #2C3E50; height: 100vh; display: flex; flex-direction: column; }

header { background: #2C3E50; color: white; padding: 0.65rem 1.4rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
.logo { background: #C0392B; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0; }
header h1 { font-size: 14px; font-weight: 600; }
header p  { font-size: 11px; opacity: 0.55; }
.hdr-meta { margin-left: auto; font-size: 11px; opacity: 0.6; text-align: right; }

.content { flex: 1; display: flex; overflow: hidden; }
#map-panel { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

.map-controls { position: absolute; top: 12px; left: 12px; z-index: 1000; display: flex; gap: 6px; }
.view-btn { padding: 6px 14px; border-radius: 20px; border: 2px solid; cursor: pointer; font-size: 12px; font-weight: 600; background: white; box-shadow: 0 1px 5px rgba(0,0,0,0.15); transition: all .15s; }

.map-summary { position: absolute; top: 12px; right: 12px; z-index: 1000; background: white; border-radius: 10px; padding: 12px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); font-size: 12px; min-width: 170px; }
.sum-title { font-size: 10px; text-transform: uppercase; color: #90A4AE; letter-spacing: .06em; margin-bottom: 8px; font-weight: 600; }
.sum-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 0.5px solid #F0F2F4; }
.sum-row:last-child { border-bottom: none; font-weight: 700; }
.sum-val { font-weight: 600; }

.legend-box { position: absolute; bottom: 24px; left: 12px; z-index: 1000; background: white; border-radius: 10px; padding: 12px 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); font-size: 11px; }
.leg-title { font-size: 10px; text-transform: uppercase; color: #90A4AE; letter-spacing: .06em; margin-bottom: 8px; font-weight: 600; }
.leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.leg-circle { border-radius: 50%; flex-shrink: 0; }

/* TOP 10 PANEL */
#side-panel { width: 260px; flex-shrink: 0; background: white; border-left: 1px solid #E0E4E8; display: flex; flex-direction: column; overflow: hidden; }
.side-title { padding: 12px 16px 8px; border-bottom: 1px solid #E8ECF0; flex-shrink: 0; }
.side-title h2 { font-size: 13px; font-weight: 600; }
.side-title p  { font-size: 11px; color: #90A4AE; margin-top: 2px; }
.side-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }
.rank-row { display: flex; align-items: center; gap: 8px; padding: 6px 16px; border-bottom: 0.5px solid #F5F5F5; }
.rank-row:hover { background: #FAFBFC; }
.rank-nr { font-size: 11px; color: #B0BEC5; min-width: 18px; text-align: right; }
.rank-name { font-size: 12px; flex: 1; line-height: 1.3; }
.rank-val { font-size: 12px; font-weight: 600; min-width: 28px; text-align: right; }
.rank-bar-wrap { width: 50px; flex-shrink: 0; }
.rank-bar { height: 6px; border-radius: 3px; }
.side-footer { padding: 10px 16px; border-top: 1px solid #E8ECF0; font-size: 10px; color: #B0BEC5; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="logo">+</div>
  <div>
    <h1>LRK HR Žemėlapis</h1>
    <p>Darbuotojai ir savanoriai pagal savivaldybę</p>
  </div>
  <div class="hdr-meta">
    Atnaujinta: 2026-04-09<br>
    Šaltinis: HR_mapping.xlsx
  </div>
</header>

<div class="content">
  <div id="map-panel">
    <div id="map"></div>
    <div class="map-controls">
      <button class="view-btn" id="vb-emp" onclick="setView('emp')">Darbuotojai</button>
      <button class="view-btn" id="vb-vol" onclick="setView('vol')">Savanoriai</button>
      <button class="view-btn" id="vb-tot" onclick="setView('tot')">Visi iš viso</button>
    </div>
    <div class="map-summary" id="sum"></div>
    <div class="legend-box"  id="leg"></div>
  </div>

  <div id="side-panel">
    <div class="side-title">
      <h2 id="side-h">Top 10</h2>
      <p id="side-sub">pagal darbuotojų skaičių</p>
    </div>
    <div class="side-scroll" id="side-list"></div>
    <div class="side-footer" id="side-footer"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

// ══════════════════════════════════════════════════════════════════════════
// DUOMENYS — atnaujinti 2026-04-09
// Keisti čia arba įkelti naują failą pas Sonatą
// ══════════════════════════════════════════════════════════════════════════
var HR = {
  "Akmenės r. sav.":     { e: 0,  v: 1   },
  "Alytaus m. sav.":     { e: 5,  v: 37  },
  "Alytaus r. sav.":     { e: 0,  v: 13  },
  "Anykščių r. sav.":    { e: 0,  v: 5   },
  "Birštono sav.":       { e: 0,  v: 1   },
  "Biržų r. sav.":       { e: 0,  v: 3   },
  "Druskininkų sav.":    { e: 0,  v: 7   },
  "Elektrėnų sav.":      { e: 1,  v: 48  },
  "Jonavos r. sav.":     { e: 1,  v: 6   },
  "Kaišiadorių r. sav.": { e: 0,  v: 15  },
  "Kalvarijos sav.":     { e: 0,  v: 1   },
  "Kauno m. sav.":       { e: 9,  v: 125 },
  "Kauno r. sav.":       { e: 0,  v: 8   },
  "Kėdainių r. sav.":    { e: 0,  v: 5   },
  "Klaipėdos m. sav.":   { e: 6,  v: 59  },
  "Klaipėdos r. sav.":   { e: 0,  v: 8   },
  "Kupiškio r. sav.":    { e: 0,  v: 8   },
  "Lazdijų r. sav.":     { e: 0,  v: 6   },
  "Marijampolės sav.":   { e: 0,  v: 2   },
  "Mažeikių r. sav.":    { e: 0,  v: 36  },
  "Molėtų r. sav.":      { e: 0,  v: 4   },
  "Palangos m. sav.":    { e: 0,  v: 24  },
  "Panevėžio m. sav.":   { e: 5,  v: 41  },
  "Panevėžio r. sav.":   { e: 0,  v: 1   },
  "Pasvalio r. sav.":    { e: 0,  v: 1   },
  "Plungės r. sav.":     { e: 0,  v: 1   },
  "Prienų r. sav.":      { e: 0,  v: 3   },
  "Radviliškio r. sav.": { e: 0,  v: 14  },
  "Raseinių r. sav.":    { e: 11, v: 5   },
  "Rokiškio r. sav.":    { e: 0,  v: 11  },
  "Šiaulių m. sav.":     { e: 7,  v: 91  },
  "Šiaulių r. sav.":     { e: 0,  v: 9   },
  "Šilalės r. sav.":     { e: 0,  v: 1   },
  "Šilutės r. sav.":     { e: 0,  v: 3   },
  "Širvintų r. sav.":    { e: 0,  v: 1   },
  "Tauragės r. sav.":    { e: 2,  v: 28  },
  "Telšių r. sav.":      { e: 0,  v: 6   },
  "Trakų r. sav.":       { e: 0,  v: 6   },
  "Ukmergės r. sav.":    { e: 1,  v: 14  },
  "Utenos r. sav.":      { e: 2,  v: 28  },
  "Varėnos r. sav.":     { e: 0,  v: 4   },
  "Vilkaviškio r. sav.": { e: 2,  v: 45  },
  "Vilniaus m. sav.":    { e: 79, v: 176 },
  "Vilniaus r. sav.":    { e: 0,  v: 3   },
  "Visagino m. sav.":    { e: 1,  v: 6   },
  "Zarasų r. sav.":      { e: 0,  v: 1   },
};

// ── Koordinatės (visos 60 savivaldybių) ──────────────────────────────────
var COORDS = {
  "Akmenės r. sav.":[56.245,22.752],"Alytaus m. sav.":[54.402,23.857],
  "Alytaus r. sav.":[54.230,24.050],"Anykščių r. sav.":[55.525,25.098],
  "Birštono sav.":[54.620,24.030],"Biržų r. sav.":[56.200,24.754],
  "Druskininkų sav.":[53.990,23.970],"Elektrėnų sav.":[54.785,24.662],
  "Ignalinos r. sav.":[55.338,26.162],"Jonavos r. sav.":[55.072,24.284],
  "Joniškio r. sav.":[56.237,23.614],"Jurbarko r. sav.":[55.074,22.742],
  "Kaišiadorių r. sav.":[54.858,24.470],"Kalvarijos sav.":[54.412,23.183],
  "Kauno m. sav.":[54.899,23.903],"Kauno r. sav.":[54.830,23.700],
  "Kazlų Rūdos sav.":[54.780,23.500],"Kėdainių r. sav.":[55.288,23.977],
  "Kelmės r. sav.":[55.627,22.937],"Klaipėdos m. sav.":[55.703,21.144],
  "Klaipėdos r. sav.":[55.600,21.350],"Kretingos r. sav.":[55.888,21.238],
  "Kupiškio r. sav.":[55.836,24.968],"Lazdijų r. sav.":[54.238,23.518],
  "Marijampolės sav.":[54.558,23.358],"Mažeikių r. sav.":[56.309,22.332],
  "Molėtų r. sav.":[55.231,25.418],"Neringos sav.":[55.350,21.070],
  "Pagėgių sav.":[55.148,21.898],"Pakruojo r. sav.":[56.071,23.936],
  "Palangos m. sav.":[55.920,21.065],"Panevėžio m. sav.":[55.735,24.354],
  "Panevėžio r. sav.":[55.850,24.500],"Pasvalio r. sav.":[56.060,24.396],
  "Plungės r. sav.":[55.910,21.850],"Prienų r. sav.":[54.638,24.049],
  "Radviliškio r. sav.":[55.790,23.543],"Raseinių r. sav.":[55.381,23.118],
  "Rietavo sav.":[55.730,21.925],"Rokiškio r. sav.":[55.961,25.584],
  "Skuodo r. sav.":[56.271,21.524],"Šakių r. sav.":[54.957,23.048],
  "Šalčininkų r. sav.":[54.308,25.387],"Šiaulių m. sav.":[55.926,23.313],
  "Šiaulių r. sav.":[55.978,23.100],"Šilalės r. sav.":[55.490,22.182],
  "Šilutės r. sav.":[55.348,21.468],"Širvintų r. sav.":[55.043,25.028],
  "Švenčionių r. sav.":[55.130,26.155],"Tauragės r. sav.":[55.252,22.289],
  "Telšių r. sav.":[55.983,22.250],"Trakų r. sav.":[54.638,24.933],
  "Ukmergės r. sav.":[55.239,24.755],"Utenos r. sav.":[55.498,25.603],
  "Varėnos r. sav.":[54.218,24.578],"Vilkaviškio r. sav.":[54.652,23.033],
  "Vilniaus m. sav.":[54.687,25.279],"Vilniaus r. sav.":[54.780,25.600],
  "Visagino m. sav.":[55.602,26.431],"Zarasų r. sav.":[55.730,26.245],
};

var VCFG = {
  emp: { color:'#1565C0', label:'Darbuotojai',  field:'e', sub:'pagal darbuotojų skaičių' },
  vol: { color:'#2E7D32', label:'Savanoriai',   field:'v', sub:'pagal savanorių skaičių'  },
  tot: { color:'#6A1B9A', label:'Visi iš viso', field:'t', sub:'pagal bendrą skaičių'     },
};

var currentView = 'emp';
var map = L.map('map').setView([55.17, 23.88], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CartoDB', opacity: 0.9
}).addTo(map);

var circleLayer = L.layerGroup().addTo(map);

function getVal(d, f) {
  if (!d) return 0;
  if (f==='t') return (d.e||0)+(d.v||0);
  return d[f]||0;
}

function circleRadius(val, maxVal) {
  if (!val || val===0) return 0;
  return Math.max(5, Math.sqrt(val/maxVal)*36);
}

function renderCircles() {
  circleLayer.clearLayers();
  var cfg = VCFG[currentView];
  var f = cfg.field;
  var maxVal = 0;
  Object.keys(HR).forEach(function(k){ var v=getVal(HR[k],f); if(v>maxVal)maxVal=v; });

  Object.keys(COORDS).forEach(function(name) {
    var coord = COORDS[name];
    var d = HR[name];
    var val = d ? getVal(d, f) : 0;

    // Grey background dot
    L.circleMarker(coord, {
      radius:5, fillColor:'#CFD8DC', color:'white', weight:1, fillOpacity:0.55
    }).addTo(circleLayer);

    if (val > 0) {
      var r = circleRadius(val, maxVal);
      L.circleMarker(coord, {
        radius: r,
        fillColor: cfg.color,
        color: 'white',
        weight: 1.5,
        fillOpacity: 0.78
      }).bindTooltip(
        '<div style="font-family:Segoe UI,Arial,sans-serif;min-width:160px">'
        +'<div style="font-weight:700;font-size:13px;margin-bottom:5px">'+name+'</div>'
        +'<div style="font-size:12px">Darbuotojai: <b>'+(d.e||0)+'</b></div>'
        +'<div style="font-size:12px">Savanoriai: <b>'+(d.v||0)+'</b></div>'
        +'<div style="font-size:12px;margin-top:3px;padding-top:3px;border-top:1px solid #eee">Iš viso: <b>'+((d.e||0)+(d.v||0))+'</b></div>'
        +'</div>',
        { sticky: true }
      ).addTo(circleLayer);
    }
  });

  updateSummary();
  updateLegend(maxVal);
  updateSideList();
}

function updateSummary() {
  var totE=0, totV=0, cov=0;
  Object.values(HR).forEach(function(d){
    totE+=d.e||0; totV+=d.v||0;
    if((d.e||0)+(d.v||0)>0) cov++;
  });
  document.getElementById('sum').innerHTML =
    '<div class="sum-title">Suvestinė</div>'
    +'<div class="sum-row"><span>Darbuotojai</span><span class="sum-val" style="color:#1565C0">'+totE+'</span></div>'
    +'<div class="sum-row"><span>Savanoriai</span><span class="sum-val" style="color:#2E7D32">'+totV+'</span></div>'
    +'<div class="sum-row"><span>Iš viso</span><span class="sum-val">'+  (totE+totV)+'</span></div>'
    +'<div class="sum-row"><span>Savivaldybės</span><span class="sum-val">'+cov+' / 60</span></div>';
}

function updateLegend(maxVal) {
  var cfg = VCFG[currentView];
  var steps = [1];
  if(maxVal>4) steps.push(Math.round(maxVal*0.25));
  if(maxVal>2) steps.push(Math.round(maxVal*0.5));
  steps.push(maxVal);
  steps = steps.filter(function(v,i,a){ return a.indexOf(v)===i && v>0; });

  var html = '<div class="leg-title">'+cfg.label+'</div>';
  steps.forEach(function(s) {
    var r = Math.max(4, Math.sqrt(s/maxVal)*36);
    html += '<div class="leg-row">'
      +'<div class="leg-circle" style="width:'+(r*2)+'px;height:'+(r*2)+'px;background:'+cfg.color+';opacity:0.78;min-width:'+(r*2)+'px"></div>'
      +'<span>'+s+'</span></div>';
  });
  html += '<div class="leg-row" style="margin-top:6px">'
    +'<div class="leg-circle" style="width:10px;height:10px;background:#CFD8DC;min-width:10px"></div>'
    +'<span style="color:#90A4AE">Nėra duomenų</span></div>';
  document.getElementById('leg').innerHTML = html;
}

function updateSideList() {
  var cfg = VCFG[currentView];
  var f = cfg.field;
  document.getElementById('side-h').textContent = 'Top 10';
  document.getElementById('side-sub').textContent = cfg.sub;

  var sorted = Object.keys(HR)
    .map(function(k){ return {name:k, val:getVal(HR[k],f), e:HR[k].e||0, v:HR[k].v||0}; })
    .filter(function(x){ return x.val>0; })
    .sort(function(a,b){ return b.val-a.val; });

  var maxVal = sorted.length ? sorted[0].val : 1;
  var top10 = sorted.slice(0, 10);

  var html = '';
  top10.forEach(function(d, i) {
    var barW = Math.round(d.val/maxVal*44);
    html += '<div class="rank-row">'
      +'<div class="rank-nr">'+(i+1)+'</div>'
      +'<div class="rank-name">'+d.name.replace(' sav.','').replace(' r.','')+'</div>'
      +'<div class="rank-bar-wrap"><div class="rank-bar" style="width:'+barW+'px;background:'+cfg.color+';opacity:0.75"></div></div>'
      +'<div class="rank-val" style="color:'+cfg.color+'">'+d.val+'</div>'
      +'</div>';
  });
  if(!html) html = '<div style="padding:16px;font-size:12px;color:#B0BEC5;text-align:center">Nėra duomenų</div>';
  document.getElementById('side-list').innerHTML = html;

  var totE=0,totV=0;
  Object.values(HR).forEach(function(d){totE+=d.e||0;totV+=d.v||0;});
  document.getElementById('side-footer').textContent =
    'Iš viso: '+totE+' darbuotojų · '+totV+' savanorių';
}

function setView(v) {
  currentView = v;
  Object.keys(VCFG).forEach(function(x) {
    var btn = document.getElementById('vb-'+x);
    var c = VCFG[x].color;
    if (x===v) { btn.style.background=c; btn.style.color='white'; btn.style.borderColor=c; }
    else        { btn.style.background='white'; btn.style.color=c; btn.style.borderColor=c; }
  });
  renderCircles();
}

setView('emp');
</script>
</body>
</html>
