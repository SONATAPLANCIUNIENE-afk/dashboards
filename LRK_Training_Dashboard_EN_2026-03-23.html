<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LRK Sessions 2026 — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --red: #C8102E; --red-h: #a50d26;
  --bg: #F4F5F7; --bg2: #FFFFFF; --bg3: #EBEDF0;
  --border: rgba(0,0,0,0.08);
  --text: #1A1C24; --text2: #3A3E52; --text3: #6B6F82;
  --green: #1A6B34; --amber: #9E5A00; --blue: #1550A0;
  --font: 'Sora', sans-serif; --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.6; padding-bottom: 60px; }

/* HEADER */
.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.header-left { display: flex; align-items: center; gap: 14px; }
.rk-badge { background: var(--red); color: #fff; font-family: var(--mono); font-size: 10px; font-weight: 500; padding: 4px 9px; letter-spacing: .08em; border-radius: 3px; }
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
.header-sub { font-size: 13px; color: var(--text2); font-family: var(--mono); }
.update-tag { font-family: var(--mono); font-size: 12px; color: var(--text2); border: 1px solid rgba(0,0,0,.1); padding: 3px 10px; border-radius: 20px; }

/* MODULE TABS */
.module-bar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; gap: 0; }
.mtab { font-size: 15px; font-weight: 600; padding: 13px 22px; border-bottom: 3px solid transparent; cursor: pointer; color: var(--text3); transition: all .15s; letter-spacing: -.01em; }
.mtab:hover { color: var(--text2); }
.mtab.act { color: var(--red); border-bottom-color: var(--red); }
.mtab-desc { font-size: 12px; font-family: var(--mono); color: var(--text2); margin-left: 6px; }

/* LAYOUT */
.main { padding: 24px 32px 0; max-width: 1400px; margin: 0 auto; }
.module-panel { display: none; }
.module-panel.act { display: block; }
.sec-label { font-family: var(--mono); font-size: 12px; color: var(--text2); letter-spacing: .08em; font-weight: 600; text-transform: uppercase; margin-bottom: 12px; margin-top: 28px; display: flex; align-items: center; gap: 8px; }
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* METRICS */
.metrics { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; }
.metric { background: var(--bg2); border: 1px solid rgba(0,0,0,.1); border-radius: 8px; padding: 16px 18px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.m-accent { height: 2px; margin: -16px -18px 12px; border-radius: 8px 8px 0 0; }
.m-label { font-size: 12px; color: var(--text2); font-family: var(--mono); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
.m-val { font-size: 36px; font-weight: 700; line-height: 1; letter-spacing: -.02em; }
.m-sub { font-size: 12px; color: var(--text2); margin-top: 5px; }

/* CARDS */
.row2 { display: grid; grid-template-columns: 1.4fr 1fr; gap: 12px; }
.row3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
.card { background: var(--bg2); border: 1px solid rgba(0,0,0,.1); border-radius: 8px; padding: 16px 18px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.c-title { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.c-sub { font-size: 13px; color: var(--text2); font-family: var(--mono); margin-bottom: 12px; }
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
.leg { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text); font-weight: 500; }
.ldot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* HEATMAP */
.hm-card { background: var(--bg2); border: 1px solid rgba(0,0,0,.1); border-radius: 8px; padding: 16px 18px; overflow-x: auto; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.hm { border-collapse: collapse; font-size: 12px; font-family: var(--mono); white-space: nowrap; }
.hm th { padding: 5px 5px; color: var(--text2); text-align: center; font-weight: 500; font-size: 12px; }
.hm th.sky-th { text-align: left; min-width: 155px; padding-right: 12px; font-weight: 500; color: var(--text2); }
.hm td { padding: 2px 3px; text-align: center; }
.hm-cell { width: 32px; height: 24px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; margin: 1px auto; cursor: default; transition: transform .1s; }
.hm-cell:hover { transform: scale(1.2); }
.hm-0  { background: rgba(0,0,0,.04); color: var(--text3); }
.iv1   { background: #d4edda; color: #1a6630; }
.iv2   { background: #9dce9d; color: #144d1e; }
.iv3   { background: #5aab5a; color: #fff; }
.iv4   { background: #1F7A3C; color: #fff; }
.su1   { background: #dbeeff; color: #1550A0; }
.su2   { background: #93c4ec; color: #0d3d7a; }
.su3   { background: #1A5FAD; color: #fff; }
.ne-c  { background: #fce8e8; color: #A32D2D; }
.now-th { color: var(--red) !important; }
.now-col { border-left: 2px solid rgba(200,16,46,.35) !important; }
.note-bar { font-size: 12px; font-family: var(--mono); color: var(--text2); padding: 10px 18px; border-top: 1px solid var(--border); }

/* TABLES */
.t-card { background: var(--bg2); border: 1px solid rgba(0,0,0,.1); border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.t-header { padding: 14px 18px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px; }
table.dt { width: 100%; border-collapse: collapse; }
table.dt th { text-align: left; font-size: 12px; font-family: var(--mono); color: var(--text2); font-weight: 600; padding: 8px 12px; border-bottom: 1px solid var(--border); font-weight: 400; letter-spacing: .04em; white-space: nowrap; }
table.dt td { padding: 10px 13px; border-bottom: 1px solid rgba(0,0,0,.05); font-size: 14px; vertical-align: middle; }
table.dt tr:last-child td { border-bottom: none; }
table.dt tfoot td { border-top: 1px solid var(--border); font-weight: 600; border-bottom: none; color: var(--text2); }
table.dt tbody tr:hover td { background: rgba(0,0,0,.015); }

/* BADGES */
.badge { display: inline-block; font-size: 12px; font-family: var(--mono); padding: 3px 9px; border-radius: 3px; letter-spacing: .04em; font-weight: 500; }
.b-r { background: rgba(200,16,46,.1); color: #a0102a; border: 1px solid rgba(200,16,46,.2); }
.b-p { background: rgba(26,107,52,.1); color: #1a6b34; border: 1px solid rgba(26,107,52,.2); }
.b-v { background: rgba(158,90,0,.1); color: #9e5a00; border: 1px solid rgba(158,90,0,.2); }
.b-s { background: rgba(21,80,160,.1); color: #1550a0; border: 1px solid rgba(21,80,160,.2); }

/* PROGRESS */
.prog-track { width: 65px; height: 4px; background: rgba(0,0,0,.08); border-radius: 2px; display: inline-block; vertical-align: middle; }
.prog-fill { height: 100%; border-radius: 2px; }
.pct-lbl { font-family: var(--mono); font-size: 12px; margin-left: 5px; font-weight: 600; vertical-align: middle; }

/* TABS */
.tabs { display: flex; gap: 5px; }
.tab { font-size: 12px; font-family: var(--mono); padding: 6px 14px; border: 1.5px solid rgba(0,0,0,.18); border-radius: 20px; background: #fff; color: var(--text2); cursor: pointer; transition: all .15s; font-weight: 500; }
.tab:hover { border-color: var(--red); color: var(--red); background: rgba(200,16,46,.04); }
.tab.act { background: var(--red); color: #fff; border-color: var(--red); }
.tab[data-reg="East"].act    { background: #C8102E; border-color: #C8102E; color: #fff; }
.tab[data-reg="South"].act   { background: #1a6b34; border-color: #1a6b34; color: #fff; }
.tab[data-reg="West"].act  { background: #9e5a00; border-color: #9e5a00; color: #fff; }
.tab[data-reg="North"].act { background: #1550a0; border-color: #1550a0; color: #fff; }
.tab[data-reg="East"]:hover    { border-color: #C8102E; color: #C8102E; background: rgba(200,16,46,.05); }
.tab[data-reg="South"]:hover   { border-color: #1a6b34; color: #1a6b34; background: rgba(26,107,52,.05); }
.tab[data-reg="West"]:hover  { border-color: #9e5a00; color: #9e5a00; background: rgba(158,90,0,.05); }
.tab[data-reg="North"]:hover { border-color: #1550a0; color: #1550a0; background: rgba(21,80,160,.05); }
/* Region group header in heatmap */
.hm-reg-row td { padding: 6px 0 2px; }
.hm-reg-hdr { font-size: 12px; font-family: var(--mono); font-weight: 700; padding: 5px 10px; border-radius: 4px; display: inline-block; }
/* Plan table */
.plan-grp-cs  { background: rgba(31,122,60,.12); color: #1a6630; }
.plan-grp-ppb { background: rgba(21,80,160,.12); color: #1550a0; }
.plan-grp-ppp { background: rgba(127,119,221,.15); color: #4a44a0; }
.plan-hdr-cs  { background: rgba(31,122,60,.08); }
.plan-hdr-ppb { background: rgba(21,80,160,.08); }
.plan-hdr-ppp { background: rgba(127,119,221,.1); }
.plan-val { font-family: var(--mono); font-size: 12px; font-weight: 500; }
.plan-dal { color: #1550a0; }
.plan-mok { color: #1a6630; font-weight: 600; }
.plan-zero { color: var(--text3); }

.g { color: #1a6630; font-family: var(--mono); font-weight: 500; }
.b { color: #1550a0; font-family: var(--mono); font-weight: 500; }
.r { color: #A32D2D; font-family: var(--mono); font-weight: 500; }
.d { color: var(--text3); font-family: var(--mono); }
.rank { font-family: var(--mono); font-size: 13px; color: var(--text2); }
</style>
</head>

// ── HELPERS ─────────────────────────────────────────────────────────────────
let activeCharts = [];
function clearCharts(){ activeCharts.forEach(c=>c.destroy()); activeCharts=[]; }
function mkChart(id, cfg){ const c=new Chart(document.getElementById(id),cfg); activeCharts.push(c); return c; }
function pctColor(p){ return p>=85?'#1a6630':p>=60?'#9e5a00':'#A32D2D'; }
function progBar(pct){
  if(pct===null||pct===undefined) return '<span class="d">—</span>';
  const w=Math.min(pct,100), c=pctColor(pct);
  return `<div class="prog-track"><div class="prog-fill" style="width:${w}%;background:${c}"></div></div><span class="pct-lbl" style="color:${c}">${pct}%</span>`;
}
function d0(v){ return (!v||v===0)?'<span class="d">—</span>':v; }

function hmCell(d, w){
  if(d.ne>0) return `<div class="hm-cell ne-c">${d.ne}✗</div>`;
  if(PAST_W.has(w)||w===NOW_W){
    if(!d.iv) return `<div class="hm-cell hm-0">·</div>`;
    const cls=d.iv>=5?'iv4':d.iv>=3?'iv3':d.iv>=2?'iv2':'iv1';
    return `<div class="hm-cell ${cls}">${d.iv}</div>`;
  } else {
    if(!d.su) return `<div class="hm-cell hm-0">·</div>`;
    const cls=d.su>=5?'su3':d.su>=3?'su2':'su1';
    return `<div class="hm-cell ${cls}">${d.su}</div>`;
  }
}

  const totSv = men.January.iv + men.February.iv;
  const kovSu = men.March.su;
  const prog3 = totIv + kovSu;
  const pct2 = hasPlan ? Math.round(totSv/(m.planMen*2)*100) : null;
  const pct3 = hasPlan ? Math.round(prog3/(m.planMen*3)*100) : null;
  const totNe = Object.values(men).reduce((a,v)=>a+(v.ne||0),0);

  const html = `

    <div class="m-sub">${hasPlan?`iš ${m.planMen*2} of plan — ${pct2}%`:'total Jan+Feb'}</div>
  </div>

function filterSky(key, reg, btn){
  if(btn){ document.querySelectorAll(`#sky-tabs-${key} .tab`).forEach(b=>b.classList.remove('act')); btn.classList.add('act'); }
  const m=MODULES[key], hasPlan=m.planMen!==null;
  const rows=Object.entries(m.skyData).filter(([,v])=>reg==='visi'||v.reg===reg).sort((a,b)=>(b[1].sau+b[1].vas)-(a[1].sau+a[1].vas));
  document.getElementById(`sky-tbody-${key}`).innerHTML=rows.map(([name,v])=>{
    const sv=v.sau+v.vas;
    const pct2=hasPlan&&v.plan?Math.round(sv/(v.plan*2)*100):null;
    const pct3=hasPlan&&v.plan?Math.round((sv+v.kovIv+v.kovSu)/(v.plan*3)*100):null;
    return `<tr>
      <td style="font-weight:500">${name}</td>
      <td><span class="badge ${REG_BADGE[v.reg]}">${v.reg}</span></td>
      ${hasPlan?`<td class="d">${v.plan||'—'}</td>`:''}
      <td class="g">${v.sau}</td><td class="g">${v.vas}</td>
      <td style="color:${v.kovIv>0?'#1a6630':'var(--text3)'};font-family:var(--mono)">${d0(v.kovIv)}</td>
      <td class="b">${d0(v.kovSu)}</td>
      ${hasPlan?`<td>${progBar(pct2)}</td><td>${progBar(pct3)}</td>`:''}
      <td class="d">${v.coords||'—'}</td>
    </tr>`;
  }).join('');
}

function filterCoord(key, reg, btn){
  if(btn){ document.querySelectorAll(`#coord-tabs-${key} .tab`).forEach(b=>b.classList.remove('act')); btn.classList.add('act'); }
  const filtered=MODULES[key].coordData.filter(c=>reg==='visi'||c.reg===reg);
  document.getElementById(`coord-tbody-${key}`).innerHTML=filtered.map((c,i)=>`<tr>
    <td class="rank">${i+1}</td>
    <td style="font-weight:500">${c.name}</td>
    <td style="color:var(--text2)">${c.sky}</td>
    <td><span class="badge ${REG_BADGE[c.reg]}">${c.reg}</span></td>
    <td class="g">${c.iv}</td>
    <td class="b">${d0(c.su)}</td>
    <td style="color:${c.ne>0?'#A32D2D':'var(--text3)'};font-family:var(--mono)">${d0(c.ne)}</td>
  </tr>`).join('');
  const tIv=filtered.reduce((a,c)=>a+c.iv,0), tSu=filtered.reduce((a,c)=>a+c.su,0), tNe=filtered.reduce((a,c)=>a+c.ne,0);
  document.getElementById(`coord-tfoot-${key}`).innerHTML=`<tr><td colspan="4">Total</td><td class="g">${tIv}</td><td class="b">${d0(tSu)}</td><td style="color:${tNe>0?'#A32D2D':'var(--text3)'};font-family:var(--mono)">${d0(tNe)}</td></tr>`;
}


function renderCoordHeatmap(key){
  const m = MODULES[key];
  const MW = m.weeks || WEEKS;
  const cwd = m.coordWeekData || {};
  if(!cwd || !Object.keys(cwd).length){ 
    const el = document.getElementById('coord-hm-table');
    if(el) el.innerHTML='<tr><td style="color:var(--text3);padding:12px">Nėra duomenų</td></tr>';
    return;
  }
  const REG_ORDER = ['East','South','West','North'];
  const REG_BG = {'East':'rgba(200,16,46,.12)','South':'rgba(26,107,52,.12)','West':'rgba(158,90,0,.12)','North':'rgba(21,80,160,.12)'};
  const REG_FG = {'East':'#a0102a','South':'#1a6b34','West':'#9e5a00','North':'#1550a0'};
  
  const hdr='<thead><tr><th class="sky-th" style="min-width:160px">Coordinator</th>'+
    MW.map(w=>`<th class="${w===NOW_W?'now-th':''}" style="${w===NOW_W?'border-left:2px solid rgba(200,16,46,.3)':''}">${WK_LBL[w]||w}</th>`).join('')+
    '</tr></thead>';
  
  let bodyRows = '';
  REG_ORDER.forEach((reg, ri) => {
    const coordsInReg = Object.entries(cwd).filter(([,v])=>v.reg===reg).sort((a,b)=>{
      const aTotal = Object.values(a[1].weeks).reduce((s,d)=>s+d.iv,0);
      const bTotal = Object.values(b[1].weeks).reduce((s,d)=>s+d.iv,0);
      return bTotal - aTotal;
    });
    if(!coordsInReg.length) return;
    const sepPad = ri===0 ? '4px 0 2px' : '10px 0 2px';
    bodyRows += `<tr class="hm-reg-row"><td style="padding:${sepPad}"><span class="hm-reg-hdr" style="background:${REG_BG[reg]};color:${REG_FG[reg]}">${reg}</span></td>${MW.map(w=>`<td class="${w===NOW_W?'now-col':''}"></td>`).join('')}</tr>`;
    coordsInReg.forEach(([name, v]) => {
      bodyRows += `<tr>
        <td style="font-weight:500;padding:4px 12px 4px 12px;white-space:nowrap;color:var(--text)">${name}</td>
        ${MW.map(w=>`<td class="${w===NOW_W?'now-col':''}">${hmCell(v.weeks[w]||{iv:0,ne:0,su:0},w)}</td>`).join('')}
      </tr>`;
    });
  });
  
  const el = document.getElementById('coord-hm-table');
  if(el) el.innerHTML = hdr + '<tbody>' + bodyRows + '</tbody>';
}
